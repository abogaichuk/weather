name: release-weather-api

# Build the weather-api server binary and attach it to a GitHub Release.
# Trigger: push a tag like `weather-api-v0.4.0` (the frequent release path).
#
# Each target builds NATIVELY on its own arch runner (x86_64 + arm64), both free
# for public repos — so there's no cross-compilation, no Docker, no cross. Built on
# Ubuntu 22.04 (glibc 2.35), so the binaries run on Debian 12 / Ubuntu 22.04+ and
# 64-bit Raspberry Pi OS Bookworm.
on:
  push:
    tags:
      - "weather-api-v*"

jobs:
  # Gate: reuse the shared fmt/clippy/test workflow. Builds only run if green.
  checks:
    uses: ./.github/workflows/checks.yml

  build:
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one arch failing shouldn't abort the other
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # grib 0.15 -> libaec-sys needs cmake >= 3.26; Ubuntu 22.04's apt ships 3.22.
      # Drop in Kitware's official static binary for the runner's arch (derived from
      # uname, which equals the target here since we build natively) and put it first
      # on PATH. No sudo, no pip/PEP-668 friction.
      - name: Install cmake >= 3.26
        run: |
          ver=3.31.6
          arch=$(uname -m) # x86_64 or aarch64
          curl -fsSL "https://github.com/Kitware/CMake/releases/download/v${ver}/cmake-${ver}-linux-${arch}.tar.gz" -o /tmp/cmake.tar.gz
          mkdir -p "$HOME/cmake"
          tar -xzf /tmp/cmake.tar.gz -C "$HOME/cmake" --strip-components=1
          echo "$HOME/cmake/bin" >> "$GITHUB_PATH"

      - name: Show toolchain
        run: cmake --version && cargo --version

      # rustup honours rust-toolchain.toml (pinned nightly); add the target for it.
      # For a native build this is a no-op, but it's explicit and safe.
      - name: Add rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build weather-api
        run: cargo build --release --locked --target ${{ matrix.target }} -p weather-api --bin weather-api

      - name: Package
        run: |
          ver="${GITHUB_REF_NAME#weather-api-v}"
          name="weather-api-v${ver}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/weather-api" "dist/$name/"
          # Best-effort docs/licence alongside the binary; don't fail if absent.
          cp README.md api/README.md LICENSE* "dist/$name/" 2>/dev/null || true
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          sha256sum "dist/$name.tar.gz" > "dist/$name.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # required for GITHUB_TOKEN to create the Release
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
